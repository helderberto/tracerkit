name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  install-test:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install from git commit
        run: |
          mkdir test-project && cd test-project && npm init -y
          npm install "github:${{ github.repository }}#${{ github.sha }}"
      - name: Verify CLI
        run: |
          cd test-project
          npx tracerkit --version
          npx tracerkit --help | grep -q "init \[path\]"
      - name: Verify init creates skills
        run: |
          cd test-project
          npx tracerkit init .
          test -f .claude/skills/tk:prd/SKILL.md
          test -f .claude/skills/tk:plan/SKILL.md
          test -f .claude/skills/tk:check/SKILL.md
      - name: Verify update is idempotent
        run: |
          cd test-project
          npx tracerkit update .
      - name: Verify uninstall removes skills
        run: |
          cd test-project
          npx tracerkit uninstall .
          test ! -d .claude/skills/tk:prd
          test ! -d .claude/skills/tk:plan
          test ! -d .claude/skills/tk:check

  plugin-validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .

  plugin-install:
    name: Test plugin installation
    runs-on: ubuntu-latest
    needs: plugin-validate
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - name: Add marketplace
        run: claude plugin marketplace add ./
      - name: List marketplaces
        run: claude plugin marketplace list
      - name: Install plugin
        run: claude plugin install tk@tracerkit-marketplace --scope user

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
